name: Test

on:
  push:
    branches: [main]
    paths:
      - "apps/api/**"
      - ".github/workflows/test.yml"
  pull_request:
    branches: [main]

jobs:
  api:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Set up uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          cache-dependency-glob: "apps/api/pyproject.toml"

      - name: Install dependencies
        run: |
          cd apps/api
          uv sync

      - name: Lint with Ruff
        run: |
          cd apps/api
          uv run ruff check app tests

      - name: Run tests
        run: |
          cd apps/api
          uv run pytest tests/ -v

  web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: |
          cd apps/web
          npm ci

      - name: Run engine tests
        run: |
          cd apps/web
          npm test
