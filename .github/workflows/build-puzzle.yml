name: Build daily puzzle

on:
  schedule:
    # GitHub cron is UTC-only. CET = UTC+1 and CEST = UTC+2, so Amsterdam
    # midnight is 23:00 UTC in winter and 22:00 UTC in summer. Run both slots
    # and skip unless the local hour is 00 (see "Skip if not Amsterdam midnight").
    - cron: "0 22 * * *"
    - cron: "0 23 * * *"
  workflow_dispatch:
    inputs:
      date:
        description: "Puzzle date (YYYY-MM-DD, default: today in Europe/Amsterdam)"
        required: false
      force:
        description: "Rebuild even if a puzzle already exists for the date"
        type: boolean
        default: false

concurrency:
  group: build-daily-puzzle
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Should run
        id: should_run
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "value=true" >> "$GITHUB_OUTPUT"
          else
            hour=$(TZ=Europe/Amsterdam date +%H)
            if [ "$hour" = "00" ]; then
              echo "value=true" >> "$GITHUB_OUTPUT"
            else
              echo "value=false" >> "$GITHUB_OUTPUT"
              echo "Not midnight in Europe/Amsterdam (local hour=$hour), skipping scheduled run."
            fi
          fi

      - uses: actions/checkout@v4
        if: steps.should_run.outputs.value == 'true'

      - name: Install uv
        if: steps.should_run.outputs.value == 'true'
        uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        if: steps.should_run.outputs.value == 'true'
        run: uv sync --project apps/api

      - name: Build and publish puzzle
        if: steps.should_run.outputs.value == 'true'
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          PRICE_BUCKETS: ${{ vars.PRICE_BUCKETS }}
        run: |
          ARGS=""
          if [ -n "${{ inputs.date }}" ]; then ARGS="$ARGS --date ${{ inputs.date }}"; fi
          if [ "${{ inputs.force }}" = "true" ]; then ARGS="$ARGS --force"; fi
          uv run --project apps/api python scripts/build_daily_puzzle.py $ARGS
